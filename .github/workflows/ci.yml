name: CI
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
jobs:
  webrtc-video-platform:
    name: WebRTC video platform
    runs-on: ubuntu-latest
    env:
      POSTGRES_PRISMA_POOL_URL: postgresql://postgres:postgres@localhost:5432/webrtc_video_platform?schema=public
      POSTGRES_PRISMA_DIRECT_URL: postgresql://postgres:postgres@localhost:5432/webrtc_video_platform?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-nextauth-secret
      GITHUB_CLIENT_ID: ci-github-client-id
      GITHUB_CLIENT_SECRET: ci-github-client-secret
      CRON_SECRET: ci-cron-secret
      DEMO_CLEANUP_ENABLED: "false"
      RSTREAM_CLIENT_ID: ci-rstream-client-id
      RSTREAM_CLIENT_SECRET: ci-rstream-client-secret
      RSTREAM_PROJECT_ENDPOINT: ci-project-endpoint
      DEVICE_TOKEN_TTL_SECONDS: "300"
      VIEWER_TOKEN_TTL_SECONDS: "120"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webrtc-video-platform/package-lock.json
      - name: Install dependencies
        working-directory: webrtc-video-platform
        shell: bash
        run: npm ci
      - name: Typecheck
        working-directory: webrtc-video-platform
        shell: bash
        run: npm run check-types
      - name: Build
        working-directory: webrtc-video-platform
        shell: bash
        run: npm run build
      - name: Audit production dependencies
        working-directory: webrtc-video-platform
        shell: bash
        run: npm audit --omit=dev --audit-level=high
  webrtc-video-streaming:
    name: WebRTC video streaming
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: webrtc-video-streaming/go.mod
          cache-dependency-path: webrtc-video-streaming/go.sum
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webrtc-video-streaming/package-lock.json
      - name: Install GStreamer dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt update
          sudo apt-get install -y libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev pkg-config
      - name: Test
        working-directory: webrtc-video-streaming
        shell: bash
        run: make test
      - name: Audit production dependencies
        working-directory: webrtc-video-streaming
        shell: bash
        run: npm audit --omit=dev --audit-level=high
